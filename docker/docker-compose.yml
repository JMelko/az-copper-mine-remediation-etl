version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: az_copper_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password_123 
      POSTGRES_DB: remediation_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: